{% extends 'clients/base.html' %}
{% block title %}My Profile{% endblock %}
{% block content %}

<style>
    .profile-pic {
        position: relative;
        width: 150px;
        height: 150px;
        margin: 0 auto;
    }

    .profile-pic img {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        object-fit: cover;
        border: 4px solid #198754;
    }

    .edit-icon {
        position: absolute;
        bottom: 0;
        right: 0;
        background: #fff;
        border-radius: 50%;
        padding: 6px;
        border: 1px solid #ccc;
        cursor: pointer;
    }

    .edit-icon input[type="file"] {
        display: none;
    }

    .edit-label {
        cursor: pointer;
    }
</style>

<div class="container mt-5" style="max-width: 600px;">
    <div class="card shadow p-4">
        <h2 class="text-center mb-4">My Profile</h2>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- Profile Pic -->
            <div class="profile-pic mb-3">
                {% if user.profile.profile_image %}
                    <img src="{{ user.profile.profile_image.url }}" alt="Profile Picture">
                {% else %}
                    <img src="https://via.placeholder.com/150" alt="No Profile">
                {% endif %}

                <div class="edit-icon">
                    <label for="id_profile_image" class="edit-label">
                        ✏️
                    </label>
                    <input type="file" name="profile_image" id="id_profile_image">
                </div>
            </div>

            <!-- User Info -->
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" value="{{ user.username }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" value="{{ user.email }}" disabled>
            </div>

            <div class="mb-3">
                <label class="form-label">Birthdate</label>
                <input type="date" name="birthdate" class="form-control" value="{{ user.profile.birthdate|date:'Y-m-d' }}">
            </div>

            <!-- Action Buttons -->
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-success">Update Profile</button>
                <a href="{% url 'logout' %}" class="btn btn-outline-danger">Logout</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
